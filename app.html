<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imginn Bulk Downloader</title>
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <main class="wrap">
    <header class="header">
      <div class="brand">
        <img class="logo" src="icons/icon64.png" alt="Imginn Bulk Downloader icon" />
        <div class="titles">
          <h1>Imginn Bulk Downloader</h1>
          <p class="sub">Paste Imginn URLs (one per line) and process them sequentially.</p>
        </div>
      </div>
    </header>

    <section class="card">
      <label class="label" for="urls">URLs</label>
      <textarea
        id="urls"
        class="textarea"
        rows="9"
        placeholder="https://imginn.com/p/...&#10;https://imginn.com/p/...&#10;..."
      ></textarea>

      <div class="actions">
        <button id="start" class="btn btn-primary" type="button">Start</button>
        <button id="next" class="btn btn-ghost" type="button" disabled>Next URL</button>
        <button id="reset" class="btn btn-ghost" type="button">Reset</button>
        <button class="btn btn-ghost" type="button" disabled>Download selected</button> <!-- Not implemented yet -->
      </div>

      <div id="preview" class="preview" aria-label="Preview area">
        <p class="preview-empty">Previews will appear here after you load a URL.</p>
      </div>

      <div class="status">
        <span id="count">0</span> URLs ready • <span id="progress">Idle</span>
      </div>

      <p class="hint">URLs without a protocol will be treated as https://</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
